version: '3.8'

services:
  # API网关
  gateway:
    image: nginx:alpine
    container_name: hsk-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - exam-service
      - question-service
      - creator-service
    networks:
      - hsk-network

  # 用户服务
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: hsk-user-service
    environment:
      - DATABASE_URL=postgresql://hskuser:hsk123456@postgres:5432/hskdb
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_NAME=user-service
      - SERVICE_PORT=8001
    depends_on:
      - postgres
      - redis
    networks:
      - hsk-network

  # 考试服务
  exam-service:
    build:
      context: ./services/exam-service
      dockerfile: Dockerfile
    container_name: hsk-exam-service
    environment:
      - DATABASE_URL=postgresql://hskuser:hsk123456@postgres:5432/hskdb
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_NAME=exam-service
      - SERVICE_PORT=8002
    depends_on:
      - postgres
      - redis
    networks:
      - hsk-network

  # 题库服务
  question-service:
    build:
      context: ./services/question-service
      dockerfile: Dockerfile
    container_name: hsk-question-service
    environment:
      - DATABASE_URL=postgresql://hskuser:hsk123456@postgres:5432/hskdb
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_NAME=question-service
      - SERVICE_PORT=8003
    depends_on:
      - postgres
      - redis
    networks:
      - hsk-network

  # 博主服务
  creator-service:
    build:
      context: ./services/creator-service
      dockerfile: Dockerfile
    container_name: hsk-creator-service
    environment:
      - DATABASE_URL=postgresql://hskuser:hsk123456@postgres:5432/hskdb
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_NAME=creator-service
      - SERVICE_PORT=8004
    depends_on:
      - postgres
      - redis
    networks:
      - hsk-network

  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: hsk-postgres
    environment:
      - POSTGRES_USER=hskuser
      - POSTGRES_PASSWORD=hsk123456
      - POSTGRES_DB=hskdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - hsk-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: hsk-redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    networks:
      - hsk-network

volumes:
  pgdata:
  redisdata:

networks:
  hsk-network:
    driver: bridge
